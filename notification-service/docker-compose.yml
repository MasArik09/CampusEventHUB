services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: notification-service-app

    volumes:
      - .:/var/www

    networks:
      - notification-network
      - campus_eventhub_network

  consumer:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: notification-service-consumer

    # Jalankan RabbitMQ consumer secara terus-menerus
    command: php artisan rabbitmq:consume

    restart: unless-stopped

    volumes:
      - .:/var/www

    depends_on:
      - app

    networks:
      - notification-network
      - campus_eventhub_network

  nginx:
    image: nginx:latest

    container_name: notification-service-nginx

    ports:
      - "8004:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - notification-network

  mysql:
    image: mysql:8

    container_name: notification-service-mysql

    restart: always

    environment:
      MYSQL_DATABASE: campus_eventhub_notifications
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3310:3306"

    networks:
      - notification-network

networks:
  notification-network:
  campus_eventhub_network:
    external: true
    name: campus_eventhub_shared_network
