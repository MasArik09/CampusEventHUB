services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: event-service-app

    volumes:
      - .:/var/www

    networks:
      - event-network
      - campus_eventhub_network

  nginx:
    image: nginx:latest

    container_name: event-service-nginx

    ports:
      - "8002:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - event-network
      - campus_eventhub_network

networks:
  event-network:
  campus_eventhub_network:
    external: true
    name: campus_eventhub_shared_network