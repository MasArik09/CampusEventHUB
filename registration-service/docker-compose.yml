services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: registration-service-app

    volumes:
      - .:/var/www

    networks:
      - registration-network
      - campus_eventhub_network

  nginx:
    image: nginx:latest

    container_name: registration-service-nginx

    ports:
      - "8003:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - registration-network

  mysql:
    image: mysql:8

    container_name: registration-service-mysql

    restart: always

    environment:
      MYSQL_DATABASE: campus_eventhub_registrations
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3309:3306"

    networks:
      - registration-network

networks:
  registration-network:
  campus_eventhub_network:
    external: true
    name: campus_eventhub_shared_network
